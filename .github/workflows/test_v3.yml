name: Validation Standard de Blida
on: [push] # Se lance à chaque fois que tu enregistres

jobs:
  test-v3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Executer l'algorithme O(n)
        run: python 06-Complexite-On-et-Determinisme/preuve_On_determinisme.py
