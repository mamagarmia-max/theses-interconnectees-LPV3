-- V3 Architecture — Master GNAT Project File
-- ============================================================================

project V3_Architecture is
   
   for Languages use ("Ada");
   
   for Source_Dirs use ("src");
   for Object_Dir use "obj";
   for Exec_Dir use "bin";
   
   -- Compiler configuration
   package Compiler is
      for Default_Switches ("Ada") use
        ("-gnatwa",
         "-gnatyg",
         "-gnat2012",
         "-gnatf",
         "-gnato13",
         "-fstack-check");
   end Compiler;
   
   -- GNATprove configuration (CRITICAL)
   package Prove is
      for Switches ("Ada") use
        ("--level=4",
         "--proof=all",
         "--report=all",
         "--timeout=300",
         "--memlimit=8192",
         "--warnings=continue",
         "--subprograms=all",
         "--checks-as-proved");
   end Prove;
   
   -- Builder configuration
   package Builder is
      for Switches ("Ada") use ("-E", "-g");
   end Builder;
   
   -- Binder configuration
   package Binder is
      for Switches ("Ada") use ("-E");
   end Binder;
   
end V3_Architecture;
