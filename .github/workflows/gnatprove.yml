with V3_GNATprove_Lesson; use V3_GNATprove_Lesson;

procedure V3_Lesson_Demo with
   SPARK_Mode => On,
   Global     => null
is
   State : V3_State := (Phase => 0.0,
                        Coherence => 0.0,
                        Checksum => 9,
                        Cycle => 0,
                        Critical_Failure => False);
   Passed : Boolean := False;
begin
   -- Run the engine (7 cycles)
   Run_V3_Engine (State, K_CYCLES);

   -- Run stress test
   Run_Stress_Test (Chaos, State, Passed);

   -- Prove everything
   pragma Assert (State.Checksum = 9);
   pragma Assert (Passed = True);
   pragma Assert (State.Phase in -1.0 .. 1.0);
   pragma Assert (State.Coherence in -1.0 .. 1.0);

   null;
end V3_Lesson_Demo;

