name: GNATprove

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  prove:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GNAT
        run: |
          sudo apt-get update
          sudo apt-get install -y gnat gprbuild gnatprove

      - name: Run GNATprove
        run: |
          cd V3_Architecture
          gnatprove -P v3_architecture.gpr --level=4 --proof=all --report=all --timeout=300
